apiVersion: v1
kind: Service
metadata:
  name: {{ include "transcriptionsuite.fullname" . }}
  labels:
    {{- include "transcriptionsuite.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - name: http
    port: {{ .Values.service.http.port }}
    targetPort: {{ .Values.service.http.targetPort }}
    protocol: TCP
  selector:
    {{- include "transcriptionsuite.selectorLabels" . | nindent 4 }}

replicaCount: 1

image:
  repository: ghcr.io/homelab-00/transcriptionsuite-server
  tag: "v1.1.3"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  http:
    port: 8000
    targetPort: 8000
  health:
    port: 8001
    targetPort: 8001

ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "5000m"
  hosts: []
    # - host: example.com
    #   paths:
    #     - path: /
    #       pathType: ImplementationSpecific
  tls: []
    # - secretName: secret-tls
    #   hosts:
    #     - example.com

env:
  - name: DATA_DIR
    value: "/data"
  - name: SERVER_HOST
    value: "0.0.0.0"
  - name: SERVER_PORT
    value: "8000"
  - name: LOG_LEVEL
    value: "INFO"
  - name: HF_HOME
    value: "/models"
  - name: BOOTSTRAP_RUNTIME_DIR
    value: "/runtime"
  - name: BOOTSTRAP_CACHE_DIR
    value: "/runtime/cache"
  - name: BOOTSTRAP_STATUS_FILE
    value: "/runtime/bootstrap-status.json"
  - name: BOOTSTRAP_TIMEOUT_SECONDS
    value: "1800"
  - name: BOOTSTRAP_REQUIRE_HF_TOKEN
    value: "false"
  - name: BOOTSTRAP_FINGERPRINT_SOURCE
    value: "lockfile"
  - name: BOOTSTRAP_REBUILD_POLICY
    value: "abi_only"
  - name: BOOTSTRAP_LOG_CHANGES
    value: "true"
  - name: CUDA_VISIBLE_DEVICES
    value: "0"
  - name: TF_CPP_MIN_LOG_LEVEL
    value: "3"
  - name: TORCH_CUDA_ALLOC_CONF
    value: "max_split_size_mb:512"
  - name: INSTALL_NEMO
    value: "true"

secretEnvVars:
  - name: HF_TOKEN
    secretName: huggingface-token
    secretKey: HF_TOKEN

resources:
  requests:
    cpu: "1"
    memory: "1Gi"
    nvidia.com/gpu: 1
  limits:
    cpu: "1.2"
    memory: "1.5Gi"
    nvidia.com/gpu: 1

runtimeClassName: nvidia

persistence:
  data:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 30Gi
  models:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 30Gi
  runtime:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 30Gi

labels:
  version: v1
  component: server
  type: gpu

extraObjects: []
